name: Go Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.21 # 指定你想要的Go版本

    - name: Build
      run: |
        go build -o ./bin/myapp ./... # 编译所有Go包和主程序
        # 如果你的项目只需要编译主程序，可以指定为：
        # go build -v ./main.go

    - name: Test
      run: go test -v ./... # 运行所有测试，如果有的话

    # 下面的步骤是可选的，用于上传构建产物或者做其他后续处理
    # - name: Upload binary
    #   uses: actions/upload-artifact@v2
    #   with:
    #     name: tcping-binary
    #     path: ./tcping # 假设编译后生成的二进制名为tcping，根据实际情况调整
